<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
  <link rel="stylesheet" href="{{ '/style.css' | relative_url }}">
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>

<body>

  <div id="site-header">
    <a href="{{ '/' | relative_url }}"><img src="{{ '/awesame.png' | relative_url }}" alt="awesame" width="50%"></a>
  </div>

  <nav id="site-nav">
    <a href="{{ '/' | relative_url }}"{% if page.url == '/' %} class="active"{% endif %}>Home</a>
    <a href="{{ '/my-story' | relative_url }}"{% if page.url contains 'my-story' %} class="active"{% endif %}>My Story</a>
    <a href="{{ '/press' | relative_url }}"{% if page.url contains 'press' %} class="active"{% endif %}>Press Kit</a>
  </nav>

  <main id="content">
    {{ content }}
  </main>

  <footer class="footer">
    <div class="footer-box">
      <a href="mailto:sam@uueird.com"><img src="{{ '/images/icons/email.svg' | relative_url }}" width="32" height="32" class="icon-invert" alt="Email"/></a>
    </div>
    <div class="footer-box">
      <a href="https://x.com/awesame"><img src="{{ '/images/icons/x.svg' | relative_url }}" width="32" height="32" class="icon-invert" alt="X"/></a>
    </div>
    <div class="footer-box">
      <a href="https://soundcloud.com/awesame"><img src="{{ '/images/icons/soundcloud.svg' | relative_url }}" width="32" height="32" class="icon-invert" alt="SoundCloud"/></a>
    </div>
    <div class="footer-box">
      <a href="https://www.instagram.com/awesa.me"><img src="{{ '/images/icons/instagram.svg' | relative_url }}" width="32" height="32" class="icon-invert" alt="Instagram"/></a>
    </div>
  </footer>

</body>
</html>
